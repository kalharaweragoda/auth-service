<div class="my-5">
  <h2 class="text-center mb-4">Register</h2>
  <form
    #registerForm="ngForm"
    (ngSubmit)="onSubmit(registerForm)"
    class="w-50 mx-auto p-4 border rounded shadow-sm bg-light"
  >
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input
        name="username"
        [(ngModel)]="username"
        required
        class="form-control"
        placeholder="Enter username"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        name="password"
        [(ngModel)]="password"
        type="password"
        required
        minlength="6"
        class="form-control"
        placeholder="Enter password (min 6 characters)"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select name="role" [(ngModel)]="role" required class="form-select">
        <option value="" disabled selected>Select role</option>
        <option value="admin">Admin</option>
        <option value="teacher">Teacher</option>
        <option value="student">Student</option>
      </select>
    </div>

    <div *ngIf="error" class="text-danger mb-2">{{ error }}</div>
    <div *ngIf="success" class="text-success mb-2">{{ success }}</div>

    <div class="d-grid">
      <button
        type="submit"
        class="btn btn-success"
        [disabled]="registerForm.invalid"
      >
        Register
      </button>
    </div>

    <div class="mt-3 text-center">
      <button type="button" class="btn btn-link" [routerLink]="['/login']">
        Already have an account? Login
      </button>
    </div>
  </form>
</div>
