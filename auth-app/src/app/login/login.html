<div class="my-5">
  <h2 class="text-center mb-4">Login</h2>
  <form
    #loginForm="ngForm"
    (ngSubmit)="onSubmit(loginForm)"
    class="w-50 mx-auto p-4 border rounded shadow-sm bg-light"
  >
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input
        name="username"
        [(ngModel)]="username"
        required
        class="form-control"
        placeholder="Enter username"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        name="password"
        [(ngModel)]="password"
        type="password"
        required
        class="form-control"
        placeholder="Enter password"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Role</label>
      <select name="role" [(ngModel)]="role" required class="form-select">
        <option value="" disabled selected>Select role</option>
        <option value="admin">Admin</option>
        <option value="teacher">Teacher</option>
        <option value="student">Student</option>
      </select>
    </div>

    <div *ngIf="error" class="text-danger mb-3">{{ error }}</div>

    <div class="d-grid">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loginForm.invalid"
      >
        Login
      </button>
    </div>

    <div class="mt-3 text-center">
      <button type="button" class="btn btn-link" [routerLink]="['/register']">
        New here? Register
      </button>
    </div>
  </form>
</div>
